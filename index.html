<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Missie 83 — Weekmenu</title>
<style>
  :root {
    --groen: #22c55e;
    --oranje: #f97316;
    --rood: #ef4444;
    --grijs: #6b7280;
    --grijs-licht: #f3f4f6;
    --wit: #ffffff;
    --rand: #e5e7eb;
    --tekst: #111827;
    --tekst-licht: #6b7280;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f9fafb;
    color: var(--tekst);
    min-height: 100vh;
  }

  /* LOGIN */
  #login-scherm {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 1rem;
  }

  .login-card {
    background: var(--wit);
    border-radius: 1.5rem;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    text-align: center;
  }

  .login-logo { font-size: 3rem; margin-bottom: 0.5rem; }
  .login-card h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.25rem; }
  .login-card p { color: var(--tekst-licht); font-size: 0.9rem; margin-bottom: 2rem; }

  .login-card input {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 1.5px solid var(--rand);
    border-radius: 0.75rem;
    font-size: 1rem;
    outline: none;
    margin-bottom: 1rem;
    transition: border-color 0.2s;
  }

  .login-card input:focus { border-color: var(--groen); }

  .login-card button {
    width: 100%;
    padding: 0.75rem;
    background: var(--groen);
    color: white;
    border: none;
    border-radius: 0.75rem;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
  }

  .login-card button:hover { background: #16a34a; }
  .login-fout { color: var(--rood); font-size: 0.85rem; margin-top: 0.75rem; display: none; }

  /* HEADER */
  header {
    background: var(--wit);
    border-bottom: 1px solid var(--rand);
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 { font-size: 1.1rem; font-weight: 700; }

  .uitlog-btn {
    padding: 0.4rem 0.75rem;
    background: var(--grijs-licht);
    border: none;
    border-radius: 0.5rem;
    font-size: 0.85rem;
    color: var(--grijs);
    cursor: pointer;
  }

  /* NAV TABS */
  .nav-tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--rand);
    background: var(--wit);
    padding: 0 1.5rem;
  }

  .nav-tab {
    padding: 0.7rem 1.25rem;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--grijs);
    border: none;
    background: none;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.15s, border-color 0.15s;
  }

  .nav-tab.actief { color: var(--groen); border-bottom-color: var(--groen); }

  /* MAIN */
  main { max-width: 1200px; margin: 0 auto; padding: 1.5rem 1rem; }

  /* WEEKSCORE */
  .weekscore-bar {
    background: var(--wit);
    border: 1px solid var(--rand);
    border-radius: 1rem;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    flex-wrap: wrap;
  }

  .weekscore-label { font-weight: 700; font-size: 1rem; }
  .weekscore-cijfer { font-size: 2rem; font-weight: 800; min-width: 3.5rem; }
  .macro-totalen { display: flex; gap: 1rem; flex-wrap: wrap; flex: 1; }

  .macro-chip {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: var(--grijs-licht);
    border-radius: 0.75rem;
    padding: 0.4rem 0.75rem;
    min-width: 70px;
  }

  .macro-chip .waarde { font-weight: 700; font-size: 0.95rem; }
  .macro-chip .naam { font-size: 0.7rem; color: var(--tekst-licht); }

  /* WEEK TABS */
  .week-tab-bar {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.25rem;
    overflow-x: auto;
    padding-bottom: 0.25rem;
  }

  .week-tab {
    padding: 0.45rem 1rem;
    border-radius: 0.5rem;
    border: 1.5px solid var(--rand);
    background: var(--wit);
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    color: var(--tekst-licht);
    transition: all 0.15s;
  }

  .week-tab.actief { background: var(--groen); color: white; border-color: var(--groen); }

  /* DAGEN GRID */
  .dagen-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1rem;
  }

  /* DAG CARD */
  .dag-card {
    background: var(--wit);
    border: 1px solid var(--rand);
    border-radius: 1rem;
    overflow: hidden;
  }

  .dag-header {
    padding: 0.875rem 1.25rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--rand);
  }

  .dag-naam { font-weight: 700; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.05em; }

  .dag-badges { display: flex; gap: 0.35rem; flex-wrap: wrap; margin-top: 0.25rem; }

  .badge { font-size: 0.7rem; font-weight: 600; padding: 0.2rem 0.5rem; border-radius: 99px; }
  .badge-training { background: #dbeafe; color: #1d4ed8; }
  .badge-rust { background: #f3f4f6; color: #4b5563; }
  .badge-gezin { background: #fce7f3; color: #9d174d; }
  .badge-papat { background: #fef3c7; color: #92400e; }

  .dag-score-ring { width: 44px; height: 44px; position: relative; flex-shrink: 0; }
  .dag-score-ring svg { transform: rotate(-90deg); }
  .dag-score-tekst {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 0.65rem; font-weight: 700; color: var(--tekst);
  }

  /* MAALTIJDEN */
  .maaltijden { padding: 0.75rem; display: flex; flex-direction: column; gap: 0.5rem; }

  .maaltijd {
    border: 1px solid var(--rand);
    border-radius: 0.75rem;
    padding: 0.75rem 1rem;
  }

  .maaltijd-type {
    font-size: 0.7rem; font-weight: 600; color: var(--tekst-licht);
    text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.15rem;
  }

  .maaltijd-naam { font-size: 0.875rem; font-weight: 600; line-height: 1.3; margin-bottom: 0.35rem; }

  .maaltijd-macros { display: flex; gap: 0.35rem; flex-wrap: wrap; margin-bottom: 0.5rem; }

  .macro-tag { font-size: 0.7rem; padding: 0.15rem 0.45rem; border-radius: 99px; font-weight: 500; }
  .tag-kcal { background: #fef3c7; color: #92400e; }
  .tag-eiwit { background: #dbeafe; color: #1d4ed8; }
  .tag-kh { background: #f0fdf4; color: #166534; }
  .tag-vet { background: #fdf4ff; color: #6b21a8; }

  /* SLIDER */
  .slider-sectie { display: flex; align-items: center; gap: 0.5rem; }
  .slider-wrap { flex: 1; }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%; height: 6px;
    border-radius: 3px; background: var(--rand);
    outline: none; cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--groen); border: 2px solid white;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2); cursor: pointer;
  }

  input[type="range"]::-moz-range-thumb {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--groen); border: 2px solid white;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2); cursor: pointer;
  }

  .slider-pct { font-size: 0.8rem; font-weight: 700; width: 2.5rem; text-align: right; }

  .gegeten-macros { margin-top: 0.4rem; font-size: 0.72rem; color: var(--tekst-licht); display: none; }
  .gegeten-macros.zichtbaar { display: block; }

  /* BEREIDING */
  .bereiding-toggle {
    margin-top: 0.4rem;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    display: flex;
    align-items: center;
    color: var(--tekst-licht);
    transition: color 0.15s;
  }
  .bereiding-toggle:hover { color: var(--tekst); }
  .bereiding-toggle svg { width: 18px; height: 18px; }

  .bereiding-inhoud {
    display: none;
    margin-top: 0.5rem;
    padding: 0.6rem 0.75rem;
    background: #f9fafb;
    border-radius: 0.5rem;
    font-size: 0.8rem;
    line-height: 1.6;
    color: var(--tekst);
    border-left: 3px solid var(--groen);
  }
  .bereiding-inhoud.zichtbaar { display: block; }
  .bereiding-inhoud ol { padding-left: 1.2rem; margin: 0; }
  .bereiding-inhoud li { margin-bottom: 0.2rem; }

  /* NA TRAINING */
  .na-training {
    background: #f0fdf4; border: 1px solid #bbf7d0;
    border-radius: 0.75rem; padding: 0.6rem 1rem;
    font-size: 0.8rem; color: #166534;
  }

  /* NOTITIE */
  .notitie-sectie {
    border-top: 1px solid var(--rand);
    padding: 0.75rem 1.25rem;
  }

  .notitie-toggle {
    font-size: 0.8rem;
    color: var(--tekst-licht);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    display: flex;
    align-items: center;
    gap: 0.35rem;
  }

  .notitie-toggle:hover { color: var(--tekst); }

  .notitie-veld {
    width: 100%;
    margin-top: 0.5rem;
    padding: 0.6rem 0.75rem;
    border: 1.5px solid var(--rand);
    border-radius: 0.5rem;
    font-size: 0.85rem;
    font-family: inherit;
    resize: vertical;
    min-height: 60px;
    outline: none;
    color: var(--tekst);
    background: var(--wit);
    transition: border-color 0.2s;
    display: none;
  }

  .notitie-veld:focus { border-color: var(--groen); }
  .notitie-veld.zichtbaar { display: block; }

  /* DAG TOTALEN */
  .dag-totalen {
    border-top: 1px solid var(--rand);
    padding: 0.875rem 1.25rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem;
  }

  .dag-totaal-item { display: flex; flex-direction: column; }
  .dag-totaal-waarde { font-size: 1.1rem; font-weight: 700; }
  .dag-totaal-label { font-size: 0.7rem; color: var(--tekst-licht); }
  .dag-totaal-doel { font-size: 0.7rem; color: var(--tekst-licht); }

  .voortgang-bar { height: 4px; background: var(--rand); border-radius: 2px; overflow: hidden; margin-top: 0.25rem; }
  .voortgang-fill { height: 100%; border-radius: 2px; transition: width 0.3s ease; }

  /* SCORE KLEUR */
  .score-rood { color: var(--rood); }
  .score-oranje { color: var(--oranje); }
  .score-groen { color: var(--groen); }

  /* BOODSCHAPPEN */
  .boodschappen-view { max-width: 700px; }

  .boodschappen-voortgang {
    background: var(--wit);
    border: 1px solid var(--rand);
    border-radius: 1rem;
    padding: 1rem 1.5rem;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .boodschappen-voortgang-tekst { font-size: 0.875rem; color: var(--grijs); white-space: nowrap; }

  .boodschappen-voortgang-bar {
    flex: 1; height: 6px;
    background: var(--rand); border-radius: 3px; overflow: hidden;
  }

  .boodschappen-voortgang-fill { height: 100%; background: var(--groen); border-radius: 3px; transition: width 0.3s; }

  .reset-btn {
    font-size: 0.8rem; color: var(--grijs);
    background: var(--grijs-licht); border: none;
    border-radius: 0.5rem; padding: 0.35rem 0.75rem;
    cursor: pointer; white-space: nowrap;
  }

  .boodschappen-categorie {
    background: var(--wit);
    border: 1px solid var(--rand);
    border-radius: 1rem;
    overflow: hidden;
    margin-bottom: 1rem;
  }

  .boodschappen-categorie-titel {
    padding: 0.75rem 1.25rem;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--grijs);
    border-bottom: 1px solid var(--rand);
    background: #fafafa;
  }

  .boodschap-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.75rem 1.25rem;
    border-bottom: 1px solid var(--rand);
    cursor: pointer;
    transition: background 0.1s;
    user-select: none;
  }

  .boodschap-item:last-child { border-bottom: none; }
  .boodschap-item:hover { background: #fafafa; }
  .boodschap-item.gekocht { opacity: 0.4; }
  .boodschap-item.gekocht .boodschap-naam { text-decoration: line-through; }

  .boodschap-checkbox {
    width: 22px; height: 22px;
    border-radius: 6px; border: 1.5px solid var(--rand);
    background: var(--wit);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 0.8rem; color: white;
    transition: all 0.15s;
  }

  .boodschap-item.gekocht .boodschap-checkbox { background: var(--groen); border-color: var(--groen); }

  .boodschap-naam { flex: 1; font-size: 0.9rem; font-weight: 500; }
  .boodschap-detail { font-size: 0.75rem; color: var(--grijs); text-align: right; }

  /* SYNC */
  .sync-status {
    position: fixed; bottom: 1rem; right: 1rem;
    background: var(--wit); border: 1px solid var(--rand);
    border-radius: 0.75rem; padding: 0.5rem 0.875rem;
    font-size: 0.8rem; color: var(--tekst-licht);
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    display: flex; align-items: center; gap: 0.4rem;
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }

  .sync-status.zichtbaar { opacity: 1; }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--groen); }
  .sync-dot.bezig { background: var(--oranje); animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* RESPONSIVE */
  @media (max-width: 640px) {
    .dagen-grid { grid-template-columns: 1fr; }
    .weekscore-bar { flex-direction: column; align-items: flex-start; }
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-scherm">
  <div class="login-card">
    <div class="login-logo">🎯</div>
    <h1>Missie 83</h1>
    <p>Jouw persoonlijke weekmenu</p>
    <input type="password" id="wachtwoord-veld" placeholder="Wachtwoord" autocomplete="current-password">
    <button onclick="controleerWachtwoord()">Inloggen</button>
    <div class="login-fout" id="login-fout">Onjuist wachtwoord. Probeer opnieuw.</div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <header>
    <h1>🎯 Missie 83</h1>
    <button class="uitlog-btn" onclick="uitloggen()">Uitloggen</button>
  </header>

  <!-- NAV -->
  <nav class="nav-tabs">
    <button class="nav-tab actief" onclick="toonView('menu', this)">📋 Menu</button>
    <button class="nav-tab" onclick="toonView('boodschappen', this)">🛒 Boodschappen</button>
  </nav>

  <main>
    <!-- MENU VIEW -->
    <div id="view-menu">
      <div class="week-tab-bar" id="week-tabs"></div>

      <div class="weekscore-bar">
        <div>
          <div class="weekscore-label">Weekscore</div>
          <div class="weekscore-cijfer" id="weekscore-tekst">—</div>
        </div>
        <div class="macro-totalen">
          <div class="macro-chip"><span class="waarde" id="week-kcal">0</span><span class="naam">kcal</span></div>
          <div class="macro-chip"><span class="waarde" id="week-eiwit">0g</span><span class="naam">eiwit</span></div>
          <div class="macro-chip"><span class="waarde" id="week-kh">0g</span><span class="naam">koolhydr.</span></div>
          <div class="macro-chip"><span class="waarde" id="week-vet">0g</span><span class="naam">vet</span></div>
        </div>
      </div>

      <div class="dagen-grid" id="dagen-container"></div>
    </div>

    <!-- BOODSCHAPPEN VIEW -->
    <div id="view-boodschappen" class="hidden boodschappen-view">
      <div style="font-size:0.8rem;color:var(--grijs);margin-bottom:0.75rem;" id="boodschappen-week-label"></div>
      <div class="boodschappen-voortgang">
        <span class="boodschappen-voortgang-tekst" id="boodschappen-voortgang-tekst">0 van 0 gekocht</span>
        <div class="boodschappen-voortgang-bar">
          <div class="boodschappen-voortgang-fill" id="boodschappen-voortgang-fill" style="width:0%"></div>
        </div>
        <button class="reset-btn" onclick="resetBoodschappen()">Reset</button>
      </div>
      <div id="boodschappen-container"></div>
    </div>
  </main>

  <div class="sync-status" id="sync-status">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-tekst">Opgeslagen</span>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  WACHTWOORD
// ═══════════════════════════════════════════════════════
const WACHTWOORD = 'Missie83';

function controleerWachtwoord() {
  const invoer = document.getElementById('wachtwoord-veld').value;
  if (invoer === WACHTWOORD) {
    document.getElementById('login-scherm').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    initialiseer();
  } else {
    document.getElementById('login-fout').style.display = 'block';
    document.getElementById('wachtwoord-veld').value = '';
  }
}

document.getElementById('wachtwoord-veld').addEventListener('keydown', e => {
  if (e.key === 'Enter') controleerWachtwoord();
});

function uitloggen() {
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login-scherm').classList.remove('hidden');
  document.getElementById('wachtwoord-veld').value = '';
}

// ═══════════════════════════════════════════════════════
//  NAV
// ═══════════════════════════════════════════════════════
function toonView(naam, btn) {
  document.getElementById('view-menu').classList.toggle('hidden', naam !== 'menu');
  document.getElementById('view-boodschappen').classList.toggle('hidden', naam !== 'boodschappen');
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('actief'));
  btn.classList.add('actief');
}

// ═══════════════════════════════════════════════════════
//  FIREBASE
// ═══════════════════════════════════════════════════════
const FIREBASE_URL = 'https://missie83-default-rtdb.europe-west1.firebasedatabase.app';

let syncTimer = null;

async function laadData() {
  try {
    const res = await fetch(`${FIREBASE_URL}/data.json`);
    const data = await res.json();
    if (data) {
      percentages = data.percentages || {};
      notities = data.notities || {};
      boodschapStatus = data.boodschappen || {};
    }
  } catch(e) {
    const opgeslagen = localStorage.getItem('missie83_data');
    if (opgeslagen) {
      const d = JSON.parse(opgeslagen);
      percentages = d.percentages || {};
      notities = d.notities || {};
      boodschapStatus = d.boodschappen || {};
    }
  }
}

async function slaOp() {
  const data = { percentages, notities, boodschappen: boodschapStatus };
  localStorage.setItem('missie83_data', JSON.stringify(data));
  try {
    await fetch(`${FIREBASE_URL}/data.json`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    toonSync('Opgeslagen ✓', false);
  } catch(e) {
    toonSync('Opgeslagen lokaal ✓', false);
  }
}

function toonSync(tekst, bezig) {
  const el = document.getElementById('sync-status');
  document.getElementById('sync-tekst').textContent = tekst;
  document.getElementById('sync-dot').className = 'sync-dot' + (bezig ? ' bezig' : '');
  el.classList.add('zichtbaar');
  clearTimeout(syncTimer);
  syncTimer = setTimeout(() => el.classList.remove('zichtbaar'), 2500);
}

function debounceOpslaan() {
  toonSync('Opslaan…', true);
  clearTimeout(window._saveTimer);
  window._saveTimer = setTimeout(slaOp, 1200);
}

// ═══════════════════════════════════════════════════════
//  MENU DATA
// ═══════════════════════════════════════════════════════
const DOELEN = {
  training: { kcal: 1750, eiwit: 145, kh: 120, vet: 60 },
  rust:     { kcal: 1350, eiwit: 110, kh: 100, vet: 45 }
};

const WEKEN = [
  {
    id: 'week-2026-21',
    label: 'Week 21 (18–24 mei)',
    dagen: [
      {
        naam: 'Maandag 18 mei', type: 'training', badges: ['training'],
        maaltijden: [

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let actieveWeekId = WEKEN[0].id;
let percentages = {};
let notities = {};
let boodschapStatus = {};

// ═══════════════════════════════════════════════════════
//  INITIALISEER
// ═══════════════════════════════════════════════════════
function initialiseer() {
  laadData().then(() => {
    renderApp();
    renderBoodschappen();
  });
}

// ═══════════════════════════════════════════════════════
//  MENU RENDER
// ═══════════════════════════════════════════════════════
function renderApp() {
  const tabsEl = document.getElementById('week-tabs');
  tabsEl.innerHTML = '';
  WEKEN.forEach(w => {
    const btn = document.createElement('button');
    btn.className = 'week-tab' + (w.id === actieveWeekId ? ' actief' : '');
    btn.textContent = w.label;
    btn.onclick = () => { actieveWeekId = w.id; renderApp(); };
    tabsEl.appendChild(btn);
  });

  const week = WEKEN.find(w => w.id === actieveWeekId);
  const container = document.getElementById('dagen-container');
  container.innerHTML = '';

  let wK = 0, wE = 0, wKH = 0, wV = 0, wS = 0;

  week.dagen.forEach((dag, dagIdx) => {
    const tot = berekenDagTotalen(week, dagIdx);
    wK += tot.kcal; wE += tot.eiwit; wKH += tot.kh; wV += tot.vet; wS += tot.score;
    container.appendChild(maakDagCard(week, dag, dagIdx, tot));
  });

  const gem = Math.round(wS / week.dagen.length);
  const scoreEl = document.getElementById('weekscore-tekst');
  scoreEl.textContent = gem + '%';
  scoreEl.className = 'weekscore-cijfer ' + (gem >= 75 ? 'score-groen' : gem >= 50 ? 'score-oranje' : 'score-rood');
  document.getElementById('week-kcal').textContent  = wK;
  document.getElementById('week-eiwit').textContent = wE + 'g';
  document.getElementById('week-kh').textContent    = wKH + 'g';
  document.getElementById('week-vet').textContent   = wV + 'g';
}

function berekenDagTotalen(week, dagIdx) {
  const dag = week.dagen[dagIdx];
  const doel = DOELEN[dag.type];
  let kcal = 0, eiwit = 0, kh = 0, vet = 0;

  dag.maaltijden.forEach((m, mIdx) => {
    const pct = (percentages[`${week.id}_${dagIdx}_${mIdx}`] ?? 100) / 100;
    kcal += m.kcal * pct; eiwit += m.eiwit * pct;
    kh   += m.kh   * pct; vet   += m.vet   * pct;
  });

  if (dag.naTraining) { kcal += 210; eiwit += 18; }

  const score = Math.min(100, Math.round(
    (Math.min(kcal / doel.kcal, 1) * 0.4 +
     Math.min(eiwit / doel.eiwit, 1) * 0.4 +
     Math.min(kh / doel.kh, 1) * 0.1 +
     Math.min(vet / doel.vet, 1) * 0.1) * 100
  ));

  return { kcal: Math.round(kcal), eiwit: Math.round(eiwit), kh: Math.round(kh), vet: Math.round(vet), score, doel };
}

function scoreKleur(pct) {
  if (pct >= 75) return '#22c55e';
  if (pct >= 50) return '#f97316';
  return '#ef4444';
}

function maakDagCard(week, dag, dagIdx, totalen) {
  const card = document.createElement('div');
  card.className = 'dag-card';
  card.id = `dag-${dagIdx}`;

  const badgeLabels  = { training: '🏋️ Trainingsdag', rust: 'Rustdag', gezin: '👨‍👩‍👧‍👦 Gezinsontbijt', patat: '🍟 Patatavond' };
  const badgeKlassen = { training: 'badge-training', rust: 'badge-rust', gezin: 'badge-gezin', patat: 'badge-papat' };
  const badgeHTML = dag.badges.map(b => `<span class="badge ${badgeKlassen[b]}">${badgeLabels[b]}</span>`).join('');

  const score = totalen.score;
  const kleur = scoreKleur(score);
  const omtrek = 2 * Math.PI * 16;
  const dash = (score / 100) * omtrek;

  const maaltijdenHTML = dag.maaltijden.map((m, mIdx) => {
    const key = `${week.id}_${dagIdx}_${mIdx}`;
    const pct = percentages[key] ?? 100;
    const gK = Math.round(m.kcal * pct / 100), gE = Math.round(m.eiwit * pct / 100);
    const gKH = Math.round(m.kh * pct / 100),  gV = Math.round(m.vet * pct / 100);
    return `
      <div class="maaltijd">
        <div class="maaltijd-type">${m.type}</div>
        <div class="maaltijd-naam">${m.naam}</div>
        <div class="maaltijd-macros">
          <span class="macro-tag tag-kcal">~${m.kcal} kcal</span>
          <span class="macro-tag tag-eiwit">~${m.eiwit}g eiwit</span>
          <span class="macro-tag tag-kh">~${m.kh}g kh</span>
          <span class="macro-tag tag-vet">~${m.vet}g vet</span>
        </div>
        ${m.bereiding ? `
        <button class="bereiding-toggle" onclick="toggleBereiding('ber-${week.id}-${dagIdx}-${mIdx}', this)" title="Bereidingswijze" aria-label="Bereidingswijze tonen">
          <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <ellipse cx="10.5" cy="11" rx="5.5" ry="4.5" stroke="currentColor" stroke-width="1.5"/>
            <line x1="5" y1="10" x2="1.5" y2="7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <div class="bereiding-inhoud" id="ber-${week.id}-${dagIdx}-${mIdx}">
          <ol>${m.bereiding.split('\n').map(s => `<li>${s.replace(/^\d+\.\s*/,'')}</li>`).join('')}</ol>
        </div>` : ''}
        <div class="slider-sectie">
          <div class="slider-wrap">
            <input type="range" min="0" max="100" value="${pct}"
              oninput="updatePct('${week.id}',${dagIdx},${mIdx},this.value)"
              style="background:linear-gradient(to right,#22c55e ${pct}%,#e5e7eb ${pct}%)">
          </div>
          <div class="slider-pct" id="pct-${week.id}-${dagIdx}-${mIdx}">${pct}%</div>
        </div>
        <div class="gegeten-macros ${pct < 100 ? 'zichtbaar' : ''}" id="geg-${week.id}-${dagIdx}-${mIdx}">
          Gegeten: ${gK} kcal &middot; ${gE}g eiwit &middot; ${gKH}g kh &middot; ${gV}g vet
        </div>
      </div>`;
  }).join('');

  const naHTML = dag.naTraining ? `<div class="na-training">⚡ Na training: ${dag.naTraining}</div>` : '';

  const kPct = Math.min(100, Math.round(totalen.kcal  / totalen.doel.kcal  * 100));
  const ePct = Math.min(100, Math.round(totalen.eiwit / totalen.doel.eiwit * 100));

  const notitieKey = `${week.id}_${dagIdx}`;
  const notitieWaarde = notities[notitieKey] || '';
  const notitieOpen = notitieWaarde.length > 0;

  card.innerHTML = `
    <div class="dag-header">
      <div>
        <div class="dag-naam">${dag.naam}</div>
        <div class="dag-badges">${badgeHTML}</div>
      </div>
      <div class="dag-score-ring">
        <svg width="44" height="44" viewBox="0 0 44 44">
          <circle cx="22" cy="22" r="16" fill="none" stroke="#e5e7eb" stroke-width="4"/>
          <circle cx="22" cy="22" r="16" fill="none" stroke="${kleur}" stroke-width="4"
            stroke-dasharray="${dash.toFixed(1)} ${omtrek.toFixed(1)}" stroke-linecap="round"/>
        </svg>
        <div class="dag-score-tekst">${score}%</div>
      </div>
    </div>
    <div class="maaltijden">
      ${maaltijdenHTML}
      ${naHTML}
    </div>
    <div class="dag-totalen">
      <div class="dag-totaal-item">
        <div class="dag-totaal-waarde" id="dag-kcal-${dagIdx}">${totalen.kcal}</div>
        <div class="dag-totaal-label">kcal gegeten</div>
        <div class="dag-totaal-doel">doel: ${totalen.doel.kcal}</div>
        <div class="voortgang-bar"><div class="voortgang-fill" style="width:${kPct}%;background:${scoreKleur(kPct)}"></div></div>
      </div>
      <div class="dag-totaal-item">
        <div class="dag-totaal-waarde" id="dag-eiwit-${dagIdx}">${totalen.eiwit}g</div>
        <div class="dag-totaal-label">eiwit gegeten</div>
        <div class="dag-totaal-doel">doel: ${totalen.doel.eiwit}g</div>
        <div class="voortgang-bar"><div class="voortgang-fill" style="width:${ePct}%;background:${scoreKleur(ePct)}"></div></div>
      </div>
    </div>
    <div class="notitie-sectie">
      <button class="notitie-toggle" onclick="toggleNotitie('${notitieKey}', this)">
        ${notitieOpen ? '📝 Notitie' : '+ Notitie toevoegen'}
      </button>
      <textarea class="notitie-veld ${notitieOpen ? 'zichtbaar' : ''}"
        id="notitie-${notitieKey}"
        placeholder="Hoe voelde je je vandaag? Bijzonderheden?"
        oninput="updateNotitie('${notitieKey}', this.value)">${notitieWaarde}</textarea>
    </div>`;

  return card;
}

// ═══════════════════════════════════════════════════════
//  INTERACTIE MENU
// ═══════════════════════════════════════════════════════
function updatePct(weekId, dagIdx, mIdx, waarde) {
  const pct = parseInt(waarde);
  percentages[`${weekId}_${dagIdx}_${mIdx}`] = pct;

  const slider = document.querySelector(`input[oninput*="'${weekId}',${dagIdx},${mIdx}"]`);
  if (slider) slider.style.background = `linear-gradient(to right,#22c55e ${pct}%,#e5e7eb ${pct}%)`;

  const pctEl = document.getElementById(`pct-${weekId}-${dagIdx}-${mIdx}`);
  if (pctEl) pctEl.textContent = pct + '%';

  const week = WEKEN.find(w => w.id === weekId);
  const m = week.dagen[dagIdx].maaltijden[mIdx];
  const gegEl = document.getElementById(`geg-${weekId}-${dagIdx}-${mIdx}`);
  if (gegEl) {
    gegEl.innerHTML = `Gegeten: ${Math.round(m.kcal*pct/100)} kcal &middot; ${Math.round(m.eiwit*pct/100)}g eiwit &middot; ${Math.round(m.kh*pct/100)}g kh &middot; ${Math.round(m.vet*pct/100)}g vet`;
    gegEl.className = 'gegeten-macros ' + (pct < 100 ? 'zichtbaar' : '');
  }

  herbereken(weekId, dagIdx);
  debounceOpslaan();
}

function herbereken(weekId, dagIdx) {
  const week = WEKEN.find(w => w.id === weekId);
  const tot = berekenDagTotalen(week, dagIdx);

  const ke = document.getElementById(`dag-kcal-${dagIdx}`);
  const ee = document.getElementById(`dag-eiwit-${dagIdx}`);
  if (ke) ke.textContent = tot.kcal;
  if (ee) ee.textContent = tot.eiwit + 'g';

  const card = document.getElementById(`dag-${dagIdx}`);
  if (card) {
    const bars = card.querySelectorAll('.voortgang-fill');
    const kPct = Math.min(100, Math.round(tot.kcal  / tot.doel.kcal  * 100));
    const ePct = Math.min(100, Math.round(tot.eiwit / tot.doel.eiwit * 100));
    if (bars[0]) { bars[0].style.width = kPct + '%'; bars[0].style.background = scoreKleur(kPct); }
    if (bars[1]) { bars[1].style.width = ePct + '%'; bars[1].style.background = scoreKleur(ePct); }

    const omtrek = 2 * Math.PI * 16;
    const dash = (tot.score / 100) * omtrek;
    const ring = card.querySelector('circle:last-of-type');
    if (ring) {
      ring.setAttribute('stroke-dasharray', `${dash.toFixed(1)} ${omtrek.toFixed(1)}`);
      ring.setAttribute('stroke', scoreKleur(tot.score));
    }
    const ringTekst = card.querySelector('.dag-score-tekst');
    if (ringTekst) ringTekst.textContent = tot.score + '%';
  }

  let wK = 0, wE = 0, wKH = 0, wV = 0, wS = 0;
  week.dagen.forEach((_, i) => {
    const t = berekenDagTotalen(week, i);
    wK += t.kcal; wE += t.eiwit; wKH += t.kh; wV += t.vet; wS += t.score;
  });
  const gem = Math.round(wS / week.dagen.length);
  const scoreEl = document.getElementById('weekscore-tekst');
  scoreEl.textContent = gem + '%';
  scoreEl.className = 'weekscore-cijfer ' + (gem >= 75 ? 'score-groen' : gem >= 50 ? 'score-oranje' : 'score-rood');
  document.getElementById('week-kcal').textContent  = wK;
  document.getElementById('week-eiwit').textContent = wE + 'g';
  document.getElementById('week-kh').textContent    = wKH + 'g';
  document.getElementById('week-vet').textContent   = wV + 'g';
}

// ═══════════════════════════════════════════════════════
//  BEREIDING
// ═══════════════════════════════════════════════════════
function toggleBereiding(id, btn) {
  const el = document.getElementById(id);
  el.classList.toggle('zichtbaar');
}

// ═══════════════════════════════════════════════════════
//  NOTITIES
// ═══════════════════════════════════════════════════════
function toggleNotitie(key, btn) {
  const veld = document.getElementById(`notitie-${key}`);
  const open = veld.classList.toggle('zichtbaar');
  btn.textContent = open ? '📝 Notitie' : '+ Notitie toevoegen';
  if (open) veld.focus();
}

function updateNotitie(key, waarde) {
  notities[key] = waarde;
  debounceOpslaan();
}

// ═══════════════════════════════════════════════════════
//  BOODSCHAPPEN
// ═══════════════════════════════════════════════════════
function renderBoodschappen() {
  const week = WEKEN.find(w => w.id === actieveWeekId);
  document.getElementById('boodschappen-week-label').textContent = '🛒 Boodschappen voor ' + week.label;
  const container = document.getElementById('boodschappen-container');
  container.innerHTML = '';

  BOODSCHAPPEN.forEach((cat, cIdx) => {
    const div = document.createElement('div');
    div.className = 'boodschappen-categorie';
    div.innerHTML = `<div class="boodschappen-categorie-titel">${cat.categorie}</div>`;

    cat.items.forEach((item, iIdx) => {
      const key = `${cIdx}_${iIdx}`;
      const gekocht = !!boodschapStatus[key];
      const el = document.createElement('div');
      el.className = 'boodschap-item' + (gekocht ? ' gekocht' : '');
      el.innerHTML = `
        <div class="boodschap-checkbox">${gekocht ? '✓' : ''}</div>
        <span class="boodschap-naam">${item.naam}</span>
        <span class="boodschap-detail">${item.detail}</span>`;
      el.onclick = () => {
        boodschapStatus[key] = !boodschapStatus[key];
        renderBoodschappen();
        debounceOpslaan();
      };
      div.appendChild(el);
    });

    container.appendChild(div);
  });

  updateBoodschappenVoortgang();
}

function updateBoodschappenVoortgang() {
  const totaal = BOODSCHAPPEN.reduce((s, c) => s + c.items.length, 0);
  const gekocht = Object.values(boodschapStatus).filter(Boolean).length;
  document.getElementById('boodschappen-voortgang-tekst').textContent = `${gekocht} van ${totaal} gekocht`;
  document.getElementById('boodschappen-voortgang-fill').style.width = Math.round(gekocht / totaal * 100) + '%';
}

function resetBoodschappen() {
  boodschapStatus = {};
  renderBoodschappen();
  debounceOpslaan();
}
</script>
